name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      SESSION_SECRET: ci-only-do-not-use-in-prod-aaaaaaaaaaaa

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm test
      - run: npm run build

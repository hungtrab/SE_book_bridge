name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bookbridge
          POSTGRES_PASSWORD: bookbridge
          POSTGRES_DB: bookbridge
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bookbridge:bookbridge@localhost:5432/bookbridge?schema=public
      SESSION_SECRET: ci-only-do-not-use-in-prod-aaaaaaaaaaaa

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run db:generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: npm run build

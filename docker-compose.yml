services:
  db:
    image: postgres:16-alpine
    container_name: bookbridge-postgres
    environment:
      POSTGRES_USER: bookbridge
      POSTGRES_PASSWORD: bookbridge
      POSTGRES_DB: bookbridge
    ports:
      - "5432:5432"
    volumes:
      - bookbridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookbridge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bookbridge_pgdata:
